services:
  guardian:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        APP_NAME: guardian-server
        APP_PORT: 8080
    environment:
      - PORT=8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GUARD_MODEL=claude-haiku-4-5
      - CURATION_MODEL=claude-haiku-4-5
      - BRAIN_BASE_URL=${BRAIN_BASE_URL}
      - BRAIN_API_KEY=${BRAIN_API_KEY}

  brain:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        APP_NAME: brain-server
        APP_PORT: 8080
    environment:
      - PORT=8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=claude-sonnet-4-6
      - BRAIN_API_KEY=${BRAIN_API_KEY}
