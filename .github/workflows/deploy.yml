name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Reusable setup ──────────────────────────────────────────────
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ── Job 1: Static analysis (tsc, ESLint, Stylelint, Prettier) ──
  analyze:
    name: Analyze
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: TypeScript
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Stylelint
        run: pnpm lint:css

      - name: Prettier
        run: pnpm format:check

  # ── Job 2: Unit & integration tests ────────────────────────────
  test-unit:
    name: Unit Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Run tests
        run: pnpm test

  # ── Job 3: E2E tests ───────────────────────────────────────────
  test-e2e:
    name: E2E Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build apps
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Core Web E2E report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-core
          path: apps/core-web/playwright-report/
          retention-days: 14

      - name: Upload Login Web E2E report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-login
          path: apps/login-web/playwright-report/
          retention-days: 14

  # ── Job 4: Deploy to GitHub Pages ──────────────────────────────
  deploy-pages:
    name: GitHub Pages
    needs: [analyze, test-unit, test-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build all apps
        run: pnpm build
        env:
          DEPLOY_PREFIX: /primer-guidy

      - name: Generate landing page
        run: pnpm generate:landing
        env:
          DEPLOY_PREFIX: /primer-guidy

      - name: Download Core Web E2E report
        uses: actions/download-artifact@v4
        with:
          name: e2e-report-core
          path: e2e-reports/core
        continue-on-error: true

      - name: Download Login Web E2E report
        uses: actions/download-artifact@v4
        with:
          name: e2e-report-login
          path: e2e-reports/login
        continue-on-error: true

      - name: Assemble deploy output
        run: |
          mkdir -p deploy
          cp dist-landing/index.html deploy/
          cp dist-landing/404.html deploy/
          if [ -d "apps/core-web/dist" ]; then
            cp -r apps/core-web/dist deploy/core
          fi
          if [ -d "apps/login-web/dist" ]; then
            cp -r apps/login-web/dist deploy/login
          fi
          mkdir -p deploy/e2e-report
          if [ -d "e2e-reports/core" ]; then
            cp -r e2e-reports/core deploy/e2e-report/core
          fi
          if [ -d "e2e-reports/login" ]; then
            cp -r e2e-reports/login deploy/e2e-report/login
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Job 5: Deploy to Firebase Hosting ──────────────────────────
  deploy-firebase:
    name: Firebase
    needs: [analyze, test-unit, test-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build all apps (no prefix)
        run: pnpm build

      - name: Generate landing page (no prefix)
        run: pnpm generate:landing

      - name: Assemble deploy output
        run: |
          mkdir -p deploy
          cp dist-landing/index.html deploy/
          if [ -d "apps/core-web/dist" ]; then
            cp -r apps/core-web/dist deploy/core
          fi
          if [ -d "apps/login-web/dist" ]; then
            cp -r apps/login-web/dist deploy/login
          fi

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          target: app
