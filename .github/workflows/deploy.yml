name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Reusable setup ──────────────────────────────────────────────
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ── Job 1: Static analysis (tsc, ESLint, Stylelint, Prettier) ──
  analyze:
    name: Analyze
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: TypeScript
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Stylelint
        run: pnpm lint:css

      - name: Prettier
        run: pnpm format:check

  # ── Job 2: Unit & integration tests ────────────────────────────
  test-unit:
    name: Unit Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Run tests
        run: pnpm test

  # ── Job 3: E2E tests ───────────────────────────────────────────
  test-e2e:
    name: E2E Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build apps
        run: pnpm build
        env:
          PUBLIC_FIREBASE_API_KEY: ${{ secrets.PUBLIC_FIREBASE_API_KEY }}
          PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.PUBLIC_FIREBASE_AUTH_DOMAIN }}
          PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.PUBLIC_FIREBASE_DATABASE_URL }}
          PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.PUBLIC_FIREBASE_PROJECT_ID }}
          PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.PUBLIC_FIREBASE_STORAGE_BUCKET }}
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          PUBLIC_FIREBASE_APP_ID: ${{ secrets.PUBLIC_FIREBASE_APP_ID }}
          PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.PUBLIC_FIREBASE_MEASUREMENT_ID }}
          PUBLIC_FIREBASE_HOSTING_SITE: ${{ secrets.PUBLIC_FIREBASE_HOSTING_SITE }}
          GUARDIAN_BASE_URL: ${{ secrets.GUARDIAN_BASE_URL }}
          VALIDATION_API_KEY: ${{ secrets.VALIDATION_API_KEY }}

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Core Web E2E report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-core
          path: apps/core-web/playwright-report/
          retention-days: 14

      - name: Upload Login Web E2E report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-login
          path: apps/login-web/playwright-report/
          retention-days: 14

  # ── Job 4: Deploy to GitHub Pages ──────────────────────────────
  deploy-pages:
    name: GitHub Pages
    needs: [analyze, test-unit, test-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build all apps
        run: pnpm build
        env:
          DEPLOY_PREFIX: /primer-guidy
          PUBLIC_FIREBASE_API_KEY: ${{ secrets.PUBLIC_FIREBASE_API_KEY }}
          PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.PUBLIC_FIREBASE_AUTH_DOMAIN }}
          PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.PUBLIC_FIREBASE_DATABASE_URL }}
          PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.PUBLIC_FIREBASE_PROJECT_ID }}
          PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.PUBLIC_FIREBASE_STORAGE_BUCKET }}
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          PUBLIC_FIREBASE_APP_ID: ${{ secrets.PUBLIC_FIREBASE_APP_ID }}
          PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.PUBLIC_FIREBASE_MEASUREMENT_ID }}
          PUBLIC_FIREBASE_HOSTING_SITE: ${{ secrets.PUBLIC_FIREBASE_HOSTING_SITE }}
          GUARDIAN_BASE_URL: ${{ secrets.GUARDIAN_BASE_URL }}
          VALIDATION_API_KEY: ${{ secrets.VALIDATION_API_KEY }}

      - name: Generate landing page
        run: pnpm generate:landing
        env:
          DEPLOY_PREFIX: /primer-guidy

      - name: Download Core Web E2E report
        uses: actions/download-artifact@v4
        with:
          name: e2e-report-core
          path: e2e-reports/core
        continue-on-error: true

      - name: Download Login Web E2E report
        uses: actions/download-artifact@v4
        with:
          name: e2e-report-login
          path: e2e-reports/login
        continue-on-error: true

      - name: Assemble deploy output
        run: |
          mkdir -p deploy
          cp dist-landing/index.html deploy/
          cp dist-landing/404.html deploy/
          if [ -d "apps/core-web/dist" ]; then
            cp -r apps/core-web/dist deploy/core
          fi
          if [ -d "apps/login-web/dist" ]; then
            cp -r apps/login-web/dist deploy/login
          fi
          if [ -d "apps/flow-web/dist" ]; then
            cp -r apps/flow-web/dist deploy/flow
          fi
          mkdir -p deploy/e2e-report
          if [ -d "e2e-reports/core" ]; then
            cp -r e2e-reports/core deploy/e2e-report/core
          fi
          if [ -d "e2e-reports/login" ]; then
            cp -r e2e-reports/login deploy/e2e-report/login
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Job 5: Deploy backend (rules + functions) ─────────────────
  deploy-backend:
    name: Backend
    needs: [analyze, test-unit, test-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Test Security Rules
        run: pnpm exec firebase emulators:exec --only firestore,database --project demo-rules-test 'pnpm exec vitest run --config tests/rules/vitest.config.ts'

      - name: Write Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa-key.json"

      - name: Deploy Security Rules
        run: pnpm exec firebase deploy --only firestore:rules,database --project guidy-app-ai
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa-key.json

      - name: Deploy Cloud Functions
        run: pnpm exec firebase deploy --only functions --project guidy-app-ai
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa-key.json

      # ── Server vars ready for Guardian/Brain deploy ──
      # When server deploy steps are added, use these env vars:
      #   GUARDIAN_BASE_URL: ${{ secrets.GUARDIAN_BASE_URL }}
      #   VALIDATION_API_KEY: ${{ secrets.VALIDATION_API_KEY }}
      #   BRAIN_BASE_URL: ${{ secrets.BRAIN_BASE_URL }}
      #   BRAIN_API_KEY: ${{ secrets.BRAIN_API_KEY }}
      #   ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      #   GUARD_MODEL: ${{ secrets.GUARD_MODEL }}
      #   CURATION_MODEL: ${{ secrets.CURATION_MODEL }}
      #   TASK_CONCURRENCY: ${{ secrets.TASK_CONCURRENCY }}
      #   FIREBASE_SERVICE_ACCOUNT: written to ${{ runner.temp }}/sa-key.json

      - name: Cleanup service account
        if: always()
        run: rm -f "$RUNNER_TEMP/sa-key.json"

  # ── Job 6: Deploy UI (hosting) ───────────────────────────────
  deploy-hosting:
    name: Hosting
    needs: [deploy-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            libs/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build all apps (no prefix)
        run: pnpm build
        env:
          PUBLIC_FIREBASE_API_KEY: ${{ secrets.PUBLIC_FIREBASE_API_KEY }}
          PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.PUBLIC_FIREBASE_AUTH_DOMAIN }}
          PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.PUBLIC_FIREBASE_DATABASE_URL }}
          PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.PUBLIC_FIREBASE_PROJECT_ID }}
          PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.PUBLIC_FIREBASE_STORAGE_BUCKET }}
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          PUBLIC_FIREBASE_APP_ID: ${{ secrets.PUBLIC_FIREBASE_APP_ID }}
          PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.PUBLIC_FIREBASE_MEASUREMENT_ID }}
          PUBLIC_FIREBASE_HOSTING_SITE: ${{ secrets.PUBLIC_FIREBASE_HOSTING_SITE }}
          GUARDIAN_BASE_URL: ${{ secrets.GUARDIAN_BASE_URL }}
          VALIDATION_API_KEY: ${{ secrets.VALIDATION_API_KEY }}

      - name: Generate landing page (no prefix)
        run: pnpm generate:landing

      - name: Assemble deploy output
        run: |
          mkdir -p deploy
          cp dist-landing/index.html deploy/
          if [ -d "apps/core-web/dist" ]; then
            cp -r apps/core-web/dist deploy/core
          fi
          if [ -d "apps/login-web/dist" ]; then
            cp -r apps/login-web/dist deploy/login
          fi
          if [ -d "apps/flow-web/dist" ]; then
            cp -r apps/flow-web/dist deploy/flow
          fi

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          target: app
