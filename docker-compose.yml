services:
  guardian:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        APP_NAME: guardian-server
        APP_PORT: 3010
    ports:
      - '3010:3010'
    environment:
      - PORT=3010
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GUARD_MODEL=claude-haiku-4-5
      - CURATION_MODEL=claude-haiku-4-5
      - BRAIN_BASE_URL=http://brain:3011
      - BRAIN_API_KEY=${BRAIN_API_KEY}

  brain:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        APP_NAME: brain-server
        APP_PORT: 3011
    ports:
      - '3011:3011'
    environment:
      - PORT=3011
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=claude-sonnet-4-6
      - BRAIN_API_KEY=${BRAIN_API_KEY}
