services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:11434/api/tags || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  prompt-validation:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        APP_NAME: prompt-validation-server
        APP_PORT: 3010
    ports:
      - '3010:3010'
    environment:
      - PORT=3010
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - GUARD_MODEL=llama-guard3:8b
      - CURATION_MODEL=llama3.1:8b
      - BRAIN_BASE_URL=http://brain:3011
      - BRAIN_API_KEY=${BRAIN_API_KEY}
    depends_on:
      ollama:
        condition: service_healthy

  brain:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        APP_NAME: brain-server
        APP_PORT: 3011
    ports:
      - '3011:3011'
    environment:
      - PORT=3011
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b
      - BRAIN_API_KEY=${BRAIN_API_KEY}
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
